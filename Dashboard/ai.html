<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Monitoramento de Rolamentos</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white font-sans">

  <div class="p-6">
    <h1 class="text-3xl font-bold mb-6"> Monitoramento de Rolamentos</h1>

    <!-- Cards principais -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
      <div class="bg-zinc-800 p-4 rounded-2xl shadow">
        <h2 class="text-zinc-400">Rolamentos OK</h2>
        <p class="text-2xl font-bold text-green-400">128</p>
      </div>

      <div class="bg-zinc-800 p-4 rounded-2xl shadow">
        <h2 class="text-zinc-400">Em Análise</h2>
        <p class="text-2xl font-bold text-yellow-400">32</p>
      </div>

      <div class="bg-zinc-800 p-4 rounded-2xl shadow">
        <h2 class="text-zinc-400">Críticos</h2>
        <p class="text-2xl font-bold text-red-400">12</p>
      </div>
    </div>

    <!-- Lista de vagões -->
    <div class="bg-zinc-900 p-4 rounded-2xl shadow">
      <h2 class="text-xl font-semibold mb-4">Status dos Vagões</h2>

      <table class="w-full text-left">
        <thead>
          <tr class="text-zinc-400 border-b border-zinc-700">
            <th class="p-2">Vagão</th>
            <th class="p-2">Score</th>
            <th class="p-2">Status</th>
            <th class="p-2">Ação</th>
          </tr>
        </thead>

        <tbody>
          <tr class="border-b border-zinc-800">
            <td class="p-2">Vagão 101</td>
            <td class="p-2">92</td>
            <td class="p-2 text-green-400">OK</td>
            <td class="p-2">Nenhuma</td>
          </tr>

          <tr class="border-b border-zinc-800">
            <td class="p-2">Vagão 102</td>
            <td class="p-2">68</td>
            <td class="p-2 text-yellow-400">Análise</td>
            <td class="p-2">Verificar</td>
          </tr>

          <tr class="border-b border-zinc-800">
            <td class="p-2">Vagão 103</td>
            <td class="p-2">45</td>
            <td class="p-2 text-red-400">Crítico</td>
            <td class="p-2">Troca imediata</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Gráfico fake -->
    <div class="mt-6 bg-zinc-900 p-4 rounded-2xl shadow">
      <h2 class="text-xl font-semibold mb-4">Tendência de Falhas</h2>
      <div class="flex gap-2 items-end h-40">
        <div class="bg-green-400 w-6 h-24"></div>
        <div class="bg-green-400 w-6 h-28"></div>
        <div class="bg-yellow-400 w-6 h-32"></div>
        <div class="bg-red-400 w-6 h-36"></div>
        <div class="bg-red-400 w-6 h-40"></div>
      </div>
    </div>

  </div>

</body>
</html>
